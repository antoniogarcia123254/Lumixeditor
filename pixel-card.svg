<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" role="img" aria-labelledby="title desc">
  <title id="title">Pixel Blocks preview</title>
  <desc id="desc">A stylized Lumix preview card with a grid background and bold pixel inspired lettering.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9fbff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1535"/>
      <stop offset="100%" stop-color="#4c78ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1000" fill="url(#bg)"/>
